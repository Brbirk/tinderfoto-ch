name: Deploy to Hostpoint FTP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@4.3.3
      with:
        server: ftp.bruno-birkhofer.ch
        username: brunobi
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /www/tinderfoto.ch/
